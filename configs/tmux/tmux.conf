########################
### CONTROL SETTINGS ###
########################
set -g mouse on        # Allow mouse use in tmux, For tmux version 2.1 and up

# Set Prefix to Ctrl+a instead of Ctrl+b
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Open new windows/panes in the path of the active terminal
bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Set vim controls for switching between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Custom commands
# bind a command-prompt -I "con "


########################
### CONTROL SETTINGS ###
########################
set-option -g renumber-windows on               # Makes windows re-order when a window is deleted
set -g base-index 1                             # Makes windows start at 1 index
setw -g pane-base-index 1                       # Makes panes start at 1 index


######################
### DESIGN CHANGES ###
######################

# # loud or quiet?
# set -g visual-activity off
# set -g visual-bell off
# set -g visual-silence off
# setw -g monitor-activity off
# set -g bell-action none

# List of tmux plugins
# set -g @plugin 'catppuccin/tmux'
# ...alongside
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark' # or 'light'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
